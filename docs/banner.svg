      <stop offset="0.55" stop-color="#5c3219"/>
      <stop offset="1" stop-color="#26140c"/>
    </linearGradient>
    <radialGradient id="felt" cx="0.66" cy="0.4" r="0.85">
      <stop offset="0" stop-color="#16885c"/>
