      <stop offset="0.13" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.42" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.78" stop-color="#000000" stop-opacity="0.16"/>
