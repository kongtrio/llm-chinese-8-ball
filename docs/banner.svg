<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Chinese 8-Ball">
  <defs>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
